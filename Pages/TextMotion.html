<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextMotion — CSS Text Animation Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Finger+Paint&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/TextMotion.css">
</head>
<body>

    <!-- Grain Overlay -->
    <div class="grain" aria-hidden="true"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">✦</span>
                <h1 class="logo-text">TextMotion</h1>
            </div>
            <div class="header-right">
                <p class="header-tag"><span class="tag-count" id="animCount">0</span> Animations</p>
                <a href="https://williamsham90.github.io/Portfolio/" target="_blank" rel="noopener noreferrer" class="gh-btn" aria-label="Portfolio">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                    <span>Portfolio</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <nav class="filter-bar">
        <div class="filter-inner">
            <button type="button" class="filter-pill active" data-filter="all">All</button>
            <button type="button" class="filter-pill" data-filter="fade">Fade</button>
            <button type="button" class="filter-pill" data-filter="slide">Slide</button>
            <button type="button" class="filter-pill" data-filter="scale">Scale</button>
            <button type="button" class="filter-pill" data-filter="bounce">Bounce</button>
            <button type="button" class="filter-pill" data-filter="gradient">Gradient</button>
            <button type="button" class="filter-pill" data-filter="glow">Glow</button>
            <button type="button" class="filter-pill" data-filter="reveal">Reveal</button>
            <button type="button" class="filter-pill" data-filter="wave">Wave</button>
            <button type="button" class="filter-pill" data-filter="glitch">Glitch</button>
            <button type="button" class="filter-pill" data-filter="special">Special</button>
            <button type="button" class="filter-pill" data-filter="advanced">Advanced</button>
        </div>
    </nav>

    <!-- Animation Grid -->
    <main class="grid-wrap">
        <div class="grid" id="animGrid"></div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="toastText">Copied!</span>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <p>Made by <strong>William</strong></p>
            <p class="footer-note">Hover cards to preview · Click copy to grab CSS + JS</p>
        </div>
    </footer>

    <script src="js/textmotion.js"></script>
</body>
</html>
