<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filter Showcase</title>
    <link rel="stylesheet" href="css/Filterlab.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="grain-overlay" aria-hidden="true"></div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">FilterLab</span>
            </div>
            <p class="header-subtitle">Every CSS filter function — visualised. Click any card to copy the code.</p>
            <a href="https://williamsham90.github.io/Portfolio/" target="_blank" rel="noopener noreferrer" class="github-btn" aria-label="View GitHub Portfolio">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                <span>Portfolio</span>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="grid" id="filterGrid">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <div class="toast" id="toast">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13.5 4.5L6.5 11.5L2.5 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Copied!</span>
    </div>

    <footer class="footer">
        <p class="footer-credit">Made by <strong>William</strong></p>
        <p class="footer-note">All filters are native CSS <code>filter</code> property functions.</p>
    </footer>

    <script src="js/filterlab.js"></script>
</body>
</html>
