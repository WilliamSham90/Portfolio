<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ParticleGen.css">
</head>
<body>

    <!-- Particle Canvas -->
    <div id="tsparticles"></div>

    <!-- UI Overlay -->
    <div class="ui-layer">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">✦</span>
                <span class="logo-text">ParticleGen</span>
            </div>
            <a href="https://williamsham90.github.io/Portfolio/" target="_blank" rel="noopener noreferrer" class="github-btn" aria-label="View GitHub Portfolio">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                <span>Portfolio</span>
            </a>
        </header>

        <!-- Theme Selector Panel -->
        <div class="theme-panel" id="themePanel">
            <button class="panel-toggle" id="panelToggle" aria-label="Toggle theme panel">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>Themes</span>
            </button>

            <div class="panel-body" id="panelBody">
                <h3 class="panel-title">Select Theme</h3>
                <div class="theme-grid" id="themeGrid">
                    <!-- Theme buttons injected by JS -->
                </div>

                <div class="panel-divider"></div>

                <h3 class="panel-title">Controls</h3>

                <div class="control-group">
                    <label class="control-label" for="particleCount">Particles</label>
                    <div class="control-row">
                        <input type="range" id="particleCount" class="range-input" min="10" max="300" value="80" step="5">
                        <span class="range-value" id="particleCountValue">80</span>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label" for="particleSpeed">Speed</label>
                    <div class="control-row">
                        <input type="range" id="particleSpeed" class="range-input" min="0.5" max="15" value="3" step="0.5">
                        <span class="range-value" id="particleSpeedValue">3</span>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label" for="particleSize">Size</label>
                    <div class="control-row">
                        <input type="range" id="particleSize" class="range-input" min="1" max="20" value="4" step="0.5">
                        <span class="range-value" id="particleSizeValue">4</span>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Interaction</label>
                    <div class="toggle-row">
                        <button class="toggle-btn active" data-interact="repulse">Repulse</button>
                        <button class="toggle-btn" data-interact="grab">Grab</button>
                        <button class="toggle-btn" data-interact="bubble">Bubble</button>
                        <button class="toggle-btn" data-interact="attract">Attract</button>
                    </div>
                </div>

                <button class="reset-btn" id="resetBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                    </svg>
                    Reset Defaults
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Made by <strong>William</strong></p>
            <p class="footer-note">Powered by tsParticles v3</p>
        </footer>
    </div>

    <!-- tsParticles v3.9.1 CDN Bundle -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/3.9.1/tsparticles.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="js/ParticleGen.js"></script>
</body>
</html>
